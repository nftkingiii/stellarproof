name: StellarProof Linux Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "app/proofs/latest-proof.json"
  pull_request:

permissions:
  contents: write

jobs:
  build-and-prove:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git pkg-config libssl-dev protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache RISC Zero toolchain
        uses: actions/cache@v4
        with:
          path: ~/.risc0
          key: risc0-${{ runner.os }}-3.0.5-groth16-0.1.0

      - name: Install RISC Zero toolchain
        run: |
          if [ ! -x "$HOME/.risc0/bin/rzup" ]; then
            curl -L https://risczero.com/install | bash
          fi
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          "$HOME/.risc0/bin/rzup" install
          "$HOME/.risc0/bin/rzup" install risc0-groth16

      - name: Test Node demo logic
        run: npm test

      - name: Test attestor contract
        run: cargo test -p stellarproof-attestor

      - name: Build attestor Wasm
        run: cargo build -p stellarproof-attestor --target wasm32v1-none --release

      - name: Generate RISC Zero Groth16 proof
        env:
          RISC0_DEV_MODE: "0"
        run: cargo run -p stellarproof-host --release

      - name: Publish proof JSON for Railway
        run: node scripts/publish-proof-json.js

      - name: Commit latest proof JSON
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/proofs/latest-proof.json
          if git diff --cached --quiet; then
            echo "latest-proof.json unchanged"
          else
            git commit -m "Publish latest proof [skip ci]"
            git push
          fi

      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellarproof-proof
          path: proof.txt

      - name: Upload latest proof JSON
        uses: actions/upload-artifact@v4
        with:
          name: stellarproof-latest-proof-json
          path: app/proofs/latest-proof.json

      - name: Upload attestor Wasm
        uses: actions/upload-artifact@v4
        with:
          name: stellarproof-attestor-wasm
          path: target/wasm32v1-none/release/stellarproof_attestor.wasm
